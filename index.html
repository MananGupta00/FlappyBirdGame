<!DOCTYPE html>
<html>
<head>
  <title>Chicken Egg Game</title>
  <style>
    body {
      text-align: center;
      background-color: #87CEEB; /* blue background */
      font-family: Arial;
    }

    #gameArea {
      position: relative;
      height: 400px;
    }

    #chicken {
      font-size: 80px;
      margin-top: 50px;
      display: inline-block;
      transition: transform 0.2s;
    }

    #egg, #chick {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 50px;
      display: none;
    }

    #egg {
      top: 150px;
    }

    #chick {
      top: 150px;
    }

    #btn {
      margin-top: 20px;
      padding: 20px 40px;
      font-size: 20px;
      border-radius: 20px;
      border: none;
      background-color: pink;
    }

    #counter {
      font-size: 24px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2 id="counter">Eggs: 0</h2>

  <div id="gameArea">
    <div id="chicken">🐥</div>
    <div id="egg">🥚</div>
    <div id="chick">🐣</div>
  </div>

  <button id="btn" onclick="layEgg()">LAY EGG</button>

  <script>
    let eggs = localStorage.getItem("eggs") || 0;
    document.getElementById("counter").innerText = "Eggs: " + eggs;

    function layEgg() {
      eggs++;
      localStorage.setItem("eggs", eggs);
      document.getElementById("counter").innerText = "Eggs: " + eggs;

      let chicken = document.getElementById("chicken");
      let egg = document.getElementById("egg");
      let chick = document.getElementById("chick");

      // chicken movement
      chicken.style.transform = "translateY(-20px)";
      setTimeout(() => {
        chicken.style.transform = "translateY(0)";
      }, 200);

      // show egg
      egg.style.display = "block";
      egg.style.transform = "translateX(-50%) scale(1.3)";

      // bounce effect
      setTimeout(() => {
        egg.style.transform = "translateX(-50%) scale(1)";
      }, 200);

      // hatch after bounce
      setTimeout(() => {
        egg.style.display = "none";
        chick.style.display = "block";

        // remove chick after 20 seconds
        setTimeout(() => {
          chick.style.display = "none";
        }, 20000);

      }, 800);
    }
  </script>

</body>
</html>
