<!DOCTYPE html>
<html>
<head>
<title>Chicken Maze Game 🐔</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  background:#aee1f9;
}

canvas {
  display:block;
}

#btn {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:80px;
  font-size:24px;
  border:none;
  border-radius:20px;
  background:orange;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<button id="btn">TAP 🐔</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🐔 Images
let momImg = new Image();
momImg.src = "https://i.imgur.com/4AiXzf8.png";

let chickImg = new Image();
chickImg.src = "https://i.imgur.com/Z6X6G6p.png";

let eggImg = new Image();
eggImg.src = "https://i.imgur.com/6X4Q7Qp.png";

let cornImg = new Image();
cornImg.src = "https://i.imgur.com/8QfQY7G.png";

// Mommy position
let mom = {x:50, y:50};

// Movement
let speed = 5;

// Eggs & chicks
let eggs = [];
let chicks = [];
let hatched = false;

// Corn
let smallCorn = null;
let bigCorn = {x: canvas.width - 120, y: canvas.height - 120};

// Maze walls
let walls = [
  {x:100,y:0,w:20,h:300},
  {x:200,y:200,w:20,h:300},
  {x:300,y:0,w:20,h:300},
  {x:400,y:200,w:20,h:300}
];

// Button control
document.getElementById("btn").onclick = () => {
  moveMom();
};

// Move mommy randomly (simple maze feel)
function moveMom() {
  let oldX = mom.x;
  let oldY = mom.y;

  let dir = Math.floor(Math.random()*4);

  if(dir===0) mom.x += speed;
  if(dir===1) mom.x -= speed;
  if(dir===2) mom.y += speed;
  if(dir===3) mom.y -= speed;

  // Wall collision
  for(let w of walls){
    if(mom.x < w.x+w.w && mom.x+60 > w.x &&
       mom.y < w.y+w.h && mom.y+60 > w.y){
        mom.x = oldX;
        mom.y = oldY;
    }
  }

  // Drop eggs
  eggs.push({x:mom.x, y:mom.y});

  // Reach end
  if(mom.x > canvas.width-150 && mom.y > canvas.height-150 && !hatched){
    hatchChicks();
  }
}

// Hatch chicks
function hatchChicks(){
  hatched = true;

  chicks = eggs.map(e => ({x:e.x, y:e.y}));

  // send chicks to start
  chicks.forEach(c => {
    c.x = 50;
    c.y = 50;
  });

  // small corn appears
  smallCorn = {x:100, y:100};
}

// Move chicks following corn → mom
function moveChicks(){
  chicks.forEach(c => {

    let target = smallCorn ? smallCorn : mom;

    c.x += (target.x - c.x)*0.02;
    c.y += (target.y - c.y)*0.02;
  });

  // When reach mom → move to big corn
  if(smallCorn && Math.abs(chicks[0].x - smallCorn.x) < 5){
    smallCorn = null;
  }
}

// Draw everything
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw maze
  ctx.fillStyle = "green";
  walls.forEach(w => ctx.fillRect(w.x,w.y,w.w,w.h));

  // Draw eggs
  if(!hatched){
    eggs.forEach(e => ctx.drawImage(eggImg, e.x, e.y, 20, 25));
  }

  // Draw chicks
  if(hatched){
    moveChicks();
    chicks.forEach(c => ctx.drawImage(chickImg, c.x, c.y, 30, 30));
  }

  // Draw mom
  ctx.drawImage(momImg, mom.x, mom.y, 60, 60);

  // Small corn
  if(smallCorn){
    ctx.drawImage(cornImg, smallCorn.x, smallCorn.y, 30, 30);
  }

  // Big corn
  if(hatched){
    ctx.drawImage(cornImg, bigCorn.x, bigCorn.y, 80, 80);
  }

  requestAnimationFrame(draw);
}

// Start game after images load
momImg.onload = () => {
  draw();
};

</script>

</body>
</html>
