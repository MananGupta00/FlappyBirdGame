<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Maze Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #aee1f9;
        font-family: Arial;
    }

    canvas {
        display: block;
        background: #d4f4dd;
    }

    #btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 80px;
        font-size: 24px;
        border-radius: 20px;
        border: none;
        background: orange;
    }
</style>
</head>

<body>

<canvas id="game"></canvas>
<button id="btn">TAP TO MOVE 🐔</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Path (maze solution)
let path = [
    {x:50,y:100},{x:150,y:100},{x:150,y:200},{x:250,y:200},
    {x:250,y:300},{x:350,y:300},{x:350,y:400},{x:450,y:400}
];

let index = 0;

// Mommy chicken
let mom = {x: path[0].x, y: path[0].y};

// Eggs & chicks
let eggs = [];
let chicks = [];
let showChicks = false;

// Corn
let smallCorn = null;
let bigCorn = {x: 500, y: 400};

// Create eggs along path
for (let i = 0; i < path.length; i++) {
    eggs.push({x: path[i].x, y: path[i].y});
}

// Tap button
document.getElementById("btn").onclick = () => {
    if (index < path.length - 1) {
        index++;
        mom.x = path[index].x;
        mom.y = path[index].y;
    }

    // Reached end
    if (index === path.length - 1 && !smallCorn) {
        smallCorn = {x: mom.x, y: mom.y};
        showChicks = true;

        // Convert eggs to chicks
        chicks = eggs.map(e => ({x: e.x, y: e.y}));
    }
};

// Draw functions
function drawMom() {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(mom.x, mom.y, 15, 0, Math.PI * 2);
    ctx.fill();
}

function drawEggs() {
    ctx.fillStyle = "white";
    eggs.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, 8, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawChicks() {
    ctx.fillStyle = "yellow";
    chicks.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 6, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawCorn(c, size) {
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(c.x, c.y, size, 0, Math.PI * 2);
    ctx.fill();
}

// Move chicks following path
function moveChicks() {
    chicks.forEach((c, i) => {
        let target = path[Math.min(path.length - 1, index)];

        c.x += (target.x - c.x) * 0.02;
        c.y += (target.y - c.y) * 0.02;
    });
}

// Game loop
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw path
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();

    if (!showChicks) {
        drawEggs();
    } else {
        drawChicks();
        moveChicks();
    }

    drawMom();

    if (smallCorn) {
        drawCorn(smallCorn, 5);
    }

    // Big corn at end
    if (index === path.length - 1) {
        drawCorn(bigCorn, 25);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
