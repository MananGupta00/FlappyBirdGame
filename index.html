<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flappy Bird Clone</title>
  <style>
    body { margin: 0; overflow: hidden; background: #70c5ce; display: flex; flex-direction: column; align-items: center; }
    canvas { display: block; background: #70c5ce; }
    #flyBtn {
      width: 100%;
      height: 120px;
      font-size: 24px;
      background: #ffcc00;
      border: none;
      outline: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<button id="flyBtn">TAP TO FLY</button><script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const flyBtn = document.getElementById("flyBtn");

let bird = { x: 50, y: 150, width: 30, height: 30, gravity: 0.6, lift: -10, velocity: 0 };
let pipes = [];
let frame = 0;
let score = 0;

function drawBird() {
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, p.width, p.top);
    ctx.fillRect(p.x, canvas.height - p.bottom, p.width, p.bottom);
  });
}

function updatePipes() {
  if (frame % 90 === 0) {
    let top = Math.random() * 200 + 50;
    let gap = 140;
    pipes.push({ x: canvas.width, width: 50, top: top, bottom: canvas.height - top - gap });
  }

  pipes.forEach(p => p.x -= 2);

  pipes = pipes.filter(p => p.x + p.width > 0);
}

function detectCollision() {
  for (let p of pipes) {
    if (
      bird.x < p.x + p.width &&
      bird.x + bird.width > p.x &&
      (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom)
    ) {
      resetGame();
    }
  }

  if (bird.y + bird.height > canvas.height || bird.y < 0) {
    resetGame();
  }
}

function resetGame() {
  bird.y = 150;
  bird.velocity = 0;
  pipes = [];
  score = 0;
}

function update() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  updatePipes();
  detectCollision();

  frame++;
  score++;
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  update();
  drawBird();
  drawPipes();
  drawScore();

  requestAnimationFrame(gameLoop);
}

// Controls
function flap() {
  bird.velocity = bird.lift;
}

document.addEventListener("keydown", flap);
canvas.addEventListener("click", flap);
flyBtn.addEventListener("touchstart", flap);
flyBtn.addEventListener("click", flap);

gameLoop();
</script></body>
</html>
